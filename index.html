<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment &amp; Credit Term Approval System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css?v=single-page-form-20260616" />
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">
          <svg viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="10" fill="#004081"/>
            <path d="M10 20h20M20 10v20" stroke="#66C5C5" stroke-width="3" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="6" stroke="#66C5C5" stroke-width="2.5" fill="none"/>
          </svg>
        </div>
        <div>
          <h1 class="login-title">PCT System</h1>
          <p class="login-subtitle">Payment &amp; Credit Term Approval</p>
        </div>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">อีเมล</label>
          <input type="email" id="login-email" class="form-control" placeholder="email@company.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">รหัสผ่าน</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="input-toggle-btn" id="toggle-password" aria-label="แสดง/ซ่อนรหัสผ่าน">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="login-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span id="login-btn-text">เข้าสู่ระบบ</span>
        </button>
      </form>

      <div class="login-demo">
        <p class="login-demo-label">Demo Accounts</p>
        <div class="demo-accounts">
          <button class="demo-badge" data-email="sales@company.com" data-pass="sales123">Sales</button>
          <button class="demo-badge" data-email="approver@company.com" data-pass="approver123">Approver</button>
          <button class="demo-badge" data-email="accounting@company.com" data-pass="acc123">Accounting</button>
          <button class="demo-badge" data-email="admin@company.com" data-pass="admin123">Admin</button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app-shell" style="display:none">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="10" fill="rgba(255,255,255,0.15)"/>
              <path d="M10 20h20M20 10v20" stroke="#66C5C5" stroke-width="3" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="6" stroke="#66C5C5" stroke-width="2.5" fill="none"/>
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-name">PCT System</span>
            <span class="brand-tagline">Approval Platform</span>
          </div>
        </div>
        <button class="sidebar-close-btn" id="sidebar-close" aria-label="ปิดเมนู">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Rendered by components.js -->
      </nav>

      <div class="sidebar-footer" id="sidebar-footer">
        <!-- Rendered by components.js -->
      </div>
    </aside>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <div class="main-wrapper">
      <!-- Top bar -->
      <header class="topbar">
        <button class="topbar-menu-btn" id="menu-toggle" aria-label="เปิดเมนู">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-actions">
          <div class="topbar-user" id="topbar-user">
            <!-- Rendered by auth.js -->
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="main-content" id="main-content">
        <!-- Pages render here -->
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal-box" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="ปิด">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Scripts (order matters - dependency chain) -->
  <script src="js/config.js?v=single-page-form-20260616"></script>
  <script src="js/data.js?v=single-page-form-20260616"></script>
  <script src="js/auth.js?v=single-page-form-20260616"></script>
  <script src="js/utils.js?v=single-page-form-20260616"></script>
  <script src="js/icons.js?v=single-page-form-20260616"></script>
  <script src="js/components.js?v=single-page-form-20260616"></script>
  <script src="js/pages/login.js?v=single-page-form-20260616"></script>
  <script src="js/pages/dashboard.js?v=single-page-form-20260616"></script>
  <script src="js/pages/requests.js?v=single-page-form-20260616"></script>
  <script src="js/pages/request-create.js?v=single-page-form-20260616"></script>
  <script src="js/pages/request-detail.js?v=single-page-form-20260616"></script>
  <script src="js/pages/approvals.js?v=single-page-form-20260616"></script>
  <script src="js/pages/accounting.js?v=single-page-form-20260616"></script>
  <script src="js/pages/reports.js?v=single-page-form-20260616"></script>
  <script src="js/pages/admin.js?v=single-page-form-20260616"></script>
  <script src="js/router.js?v=single-page-form-20260616"></script>
  <script src="js/app.js?v=single-page-form-20260616"></script>
</body>
</html>
